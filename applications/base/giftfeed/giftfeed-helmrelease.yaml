apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: giftfeed
  namespace: ${release_env}-giftfeed
spec:
  interval: 5m
  chart:
    spec:
      chart: giftfeed
      version: ">=0.1.0-0"
      sourceRef:
        kind: HelmRepository
        name: ghcr-coryb-charts
        namespace: flux-system
  values:
    replicaCount: 1
    imagePullSecrets:
      - name: ghcr-regcred
    
  valuesFrom:
    - kind: Secret
      name: giftfeed-secrets
      valuesKey: litestreamAccessKeyId
      targetPath: litestream.accessKeyId
    - kind: Secret
      name: giftfeed-secrets
      valuesKey: litestreamSecretAccessKey
      targetPath: litestream.secretAccessKey
